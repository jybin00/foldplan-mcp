<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 520" role="img" aria-labelledby="title desc">
  <title id="title">FoldPlan MCP read and write flow</title>
  <desc id="desc">A diagram showing an AI assistant reading planner context and using a propose, confirm, apply sequence for gated writes.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#4a3927" flood-opacity="0.14"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L8,3 z" fill="#2f8357"/>
    </marker>
  </defs>
  <rect width="760" height="520" rx="28" fill="#fffdf8"/>
  <rect x="34" y="34" width="692" height="452" rx="24" fill="#f8f5ef" stroke="#ded4c6" stroke-width="2"/>
  <g filter="url(#shadow)">
    <rect x="70" y="88" width="200" height="128" rx="18" fill="#fffdf8" stroke="#ded4c6" stroke-width="2"/>
    <rect x="70" y="300" width="200" height="128" rx="18" fill="#fffdf8" stroke="#ded4c6" stroke-width="2"/>
    <rect x="490" y="88" width="200" height="128" rx="18" fill="#fffdf8" stroke="#ded4c6" stroke-width="2"/>
    <rect x="490" y="300" width="200" height="128" rx="18" fill="#fffdf8" stroke="#ded4c6" stroke-width="2"/>
    <rect x="304" y="190" width="152" height="140" rx="22" fill="#2f8357"/>
  </g>
  <text x="170" y="126" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="18" font-weight="800" fill="#242321">AI assistant</text>
  <text x="170" y="154" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="15" font-weight="600" fill="#6f675e">asks with a scoped</text>
  <text x="170" y="178" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="15" font-weight="600" fill="#6f675e">MCP token</text>
  <text x="380" y="232" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="20" font-weight="850" fill="#fff">FoldPlan</text>
  <text x="380" y="260" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="20" font-weight="850" fill="#fff">MCP</text>
  <text x="380" y="289" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="14" font-weight="650" fill="#dcefe2">bounded tools</text>
  <text x="590" y="126" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="18" font-weight="800" fill="#242321">Read context</text>
  <text x="590" y="154" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="15" font-weight="600" fill="#6f675e">bounded day metadata,</text>
  <text x="590" y="178" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="15" font-weight="600" fill="#6f675e">goals, reports</text>
  <text x="170" y="338" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="18" font-weight="800" fill="#242321">Propose patch</text>
  <text x="170" y="366" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="15" font-weight="600" fill="#6f675e">typed preview with</text>
  <text x="170" y="390" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="15" font-weight="600" fill="#6f675e">affected dates</text>
  <text x="590" y="338" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="18" font-weight="800" fill="#242321">Apply only after</text>
  <text x="590" y="366" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="15" font-weight="600" fill="#6f675e">confirmation, audit,</text>
  <text x="590" y="390" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="15" font-weight="600" fill="#6f675e">idempotency checks</text>
  <path d="M270 150 C318 150 318 224 304 242" fill="none" stroke="#2f8357" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M456 230 C486 206 488 168 490 152" fill="none" stroke="#2f8357" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M304 292 C286 336 272 360 270 364" fill="none" stroke="#2f8357" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M270 380 C376 464 506 424 520 414" fill="none" stroke="#2f8357" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
</svg>
